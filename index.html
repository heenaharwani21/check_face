<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Check-In</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: #eef2f6;
            color: #17202a;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        main {
            width: min(760px, 100%);
            background: white;
            border: 1px solid #dce3ea;
            border-radius: 8px;
            padding: 28px;
            box-shadow: 0 14px 34px rgba(15, 23, 42, 0.12);
        }

        h1 {
            font-size: 2rem;
            color: #14213d;
            margin-bottom: 10px;
            letter-spacing: 0;
        }

        p {
            color: #52616f;
            line-height: 1.55;
            margin-bottom: 22px;
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        a {
            display: block;
            text-decoration: none;
            color: white;
            padding: 18px;
            border-radius: 8px;
            font-weight: 800;
            text-align: center;
        }

        .admin {
            background: #14213d;
        }

        .user {
            background: #0f766e;
        }

        @media (max-width: 620px) {
            .actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main>
        <h1>Face Check-In System</h1>
        <p>Use the admin side to register faces and monitor approved logs. Use the user side for face detection, approval, and check-in.</p>
        <div class="actions">
            <a class="admin" href="/admin.html">Open Admin Panel</a>
            <a class="user" href="/user.html">Open User Check-In</a>
        </div>
    </main>
</body>
</html>
